<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form GET/POST Test</title>
    <style>
        body {
            font-family: Georgia, "Times New Roman", serif;
            margin: 0;
            padding: 24px;
            background: linear-gradient(135deg, #f6f1e9, #e0f2ff);
            color: #1d2a36;
        }
        .wrap {
            max-width: 860px;
            margin: 0 auto;
            background: #ffffff;
            border: 1px solid #d7e2ec;
            border-radius: 10px;
            padding: 20px;
        }
        h1 {
            margin-top: 0;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }
        @media (min-width: 900px) {
            .grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        fieldset {
            border: 1px solid #c8d8e8;
            border-radius: 8px;
            padding: 14px;
        }
        legend {
            font-weight: bold;
            padding: 0 6px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-size: 0.95rem;
        }
        input, textarea {
            width: 100%;
            box-sizing: border-box;
            margin-top: 4px;
            padding: 8px;
            border: 1px solid #b9cbdc;
            border-radius: 6px;
            font: inherit;
        }
        button {
            margin-top: 12px;
            padding: 9px 14px;
            border: none;
            border-radius: 6px;
            background: #1f6aa5;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #154f7d;
        }
        .hint {
            margin-top: 14px;
            padding: 10px;
            border-radius: 6px;
            background: #eef6ff;
            border: 1px solid #cfe2f8;
            font-size: 0.92rem;
        }
        code {
            background: #f3f7fa;
            padding: 1px 4px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Browser Form Test (GET / POST)</h1>
        <p>This page submits to <code>/cgi-bin/test.py</code>.</p>

        <div class="grid">
            <fieldset>
                <legend>GET form</legend>
                <form method="GET" action="/cgi-bin/test.py">
                    <label for="getName">name</label>
                    <input id="getName" name="name" type="text" value="alice">

                    <label for="getCity">city</label>
                    <input id="getCity" name="city" type="text" value="lausanne">

                    <button type="submit">Send GET</button>
                </form>
            </fieldset>

            <fieldset>
                <legend>POST form (urlencoded)</legend>
                <form method="POST" action="/cgi-bin/test.py">
                    <label for="postName">name</label>
                    <input id="postName" name="name" type="text" value="bob">

                    <label for="postMsg">message</label>
                    <textarea id="postMsg" name="message" rows="4">hello from browser form</textarea>

                    <button type="submit">Send POST</button>
                </form>
            </fieldset>
        </div>

        <div class="hint">
            Expected output from CGI: METHOD, QUERY, CONTENT_TYPE, RAW BODY and parsed POST fields.
        </div>
    </div>
</body>
</html>
